apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-init-sql
  labels:
    app: mcp-toolbox
data:
  init.sql: |
    -- Initialization script for the toolbox PostgreSQL database
    CREATE USER toolbox_client WITH PASSWORD 'my-password';

    CREATE DATABASE toolbox_db;
    GRANT ALL PRIVILEGES ON DATABASE toolbox_db TO toolbox_client;

    ALTER DATABASE toolbox_db OWNER TO toolbox_client;

    -- Connect to toolbox_db as toolbox_client
    \c toolbox_db toolbox_client

    -- Create hotels table
    CREATE TABLE IF NOT EXISTS hotels (
        id VARCHAR(255) PRIMARY KEY,
        name VARCHAR(255) NOT NULL,
        location VARCHAR(255) NOT NULL,
        booked BIT(1) DEFAULT B'0',
        checkin_date DATE,
        checkout_date DATE
    );

    -- Seed initial hotels data
    INSERT INTO hotels (id, name, location, booked, checkin_date, checkout_date) VALUES
    ('1', 'Grand Plaza Hotel', 'New York', B'0', NULL, NULL),
    ('2', 'Seaside Resort', 'Miami', B'0', NULL, NULL),
    ('3', 'Mountain Lodge', 'Denver', B'0', NULL, NULL),
    ('4', 'Central Park Suites', 'New York', B'0', NULL, NULL)
    ON CONFLICT (id) DO NOTHING;
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-tools-yaml
  labels:
    app: mcp-toolbox
data:
  tools.yaml: |
    kind: source
    name: my-pg-source
    type: postgres
    host: 127.0.0.1
    port: 5432
    database: toolbox_db
    user: toolbox_client
    password: my-password
    ---
    kind: tool
    name: search-hotels-by-name
    type: postgres-sql
    source: my-pg-source
    description: Search for hotels based on name.
    parameters:
      - name: name
        type: string
        description: The name of the hotel.
    statement: SELECT * FROM hotels WHERE name ILIKE '%' || $1 || '%';
    ---
    kind: tool
    name: search-hotels-by-location
    type: postgres-sql
    source: my-pg-source
    description: Search for hotels based on location.
    parameters:
      - name: location
        type: string
        description: The location of the hotel.
    statement: SELECT * FROM hotels WHERE location ILIKE '%' || $1 || '%';
    ---
    kind: tool
    name: book-hotel
    type: postgres-sql
    source: my-pg-source
    description: >-
       Book a hotel by its ID. If the hotel is successfully booked, returns a NULL, raises an error if not.
    parameters:
      - name: hotel_id
        type: string
        description: The ID of the hotel to book.
    statement: UPDATE hotels SET booked = B'1' WHERE id = $1;
    ---
    kind: tool
    name: update-hotel
    type: postgres-sql
    source: my-pg-source
    description: >-
      Update a hotel's check-in and check-out dates by its ID. Returns a message
      indicating  whether the hotel was successfully updated or not.
    parameters:
      - name: hotel_id
        type: string
        description: The ID of the hotel to update.
      - name: checkin_date
        type: string
        description: The new check-in date of the hotel.
      - name: checkout_date
        type: string
        description: The new check-out date of the hotel.
    statement: >-
      UPDATE hotels SET checkin_date = CAST($2 as date), checkout_date = CAST($3
      as date) WHERE id = $1;
    ---
    kind: tool
    name: cancel-hotel
    type: postgres-sql
    source: my-pg-source
    description: Cancel a hotel by its ID.
    parameters:
      - name: hotel_id
        type: string
        description: The ID of the hotel to cancel.
    statement: UPDATE hotels SET booked = B'0' WHERE id = $1;
    ---
    kind: toolset
    name: my-toolset
    tools:
      - search-hotels-by-name
      - search-hotels-by-location
      - book-hotel
      - update-hotel
      - cancel-hotel
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mcp-postgres-pvc
  labels:
    app: mcp-toolbox
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-database-toolbox
  labels:
    app: mcp-toolbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-toolbox
  template:
    metadata:
      labels:
        app: mcp-toolbox
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "123456"
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d/init.sql
              subPath: init.sql
        - name: toolbox
          image: us-central1-docker.pkg.dev/database-toolbox/toolbox/toolbox:latest
          imagePullPolicy: IfNotPresent
          command: ["--config", "/app/tools.yaml", "--address", "0.0.0.0", "--port", "5000"]
          ports:
            - containerPort: 5000
              name: toolbox
          volumeMounts:
            - name: tools-yaml
              mountPath: /app/tools.yaml
              subPath: tools.yaml
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: mcp-postgres-pvc
        - name: init-sql
          configMap:
            name: mcp-init-sql
        - name: tools-yaml
          configMap:
            name: mcp-tools-yaml
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-toolbox-service
  labels:
    app: mcp-toolbox
spec:
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: 5000
      name: mcp-toolbox
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: mcp-toolbox
